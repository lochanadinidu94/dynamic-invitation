<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINNAH 2026 Invitation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div id="door-container" class="door-wrapper">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="door-content">
            <h1 class="logo-text">RINNAH 2026</h1>
            <p>A Heavenly Night of Worship</p>
            <button onclick="openDoor()" class="open-btn">OPEN INVITATION</button>
        </div>
    </div>

    <main id="invitation-page" class="hidden">
        <div class="card">
            <p style="text-transform: uppercase; letter-spacing: 2px;">Welcome</p>
            <h1 id="guest-name">Loading Guest...</h1>
            <div class="details">
                <p>We are honored to invite you to the<br><strong>RINNAH Christian Music Concert</strong></p>
                <p>📍 Melbourne Grand Hall<br>📅 Sept 12, 2026 | 6:00 PM</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
