<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINNAH 2026 | Invitation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div id="door-container" class="door-wrapper">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="door-content">
            <h1 class="logo-text">RINNAH 2026</h1>
            <p>A Heavenly Melody Awaits</p>
            <button onclick="openDoor()" class="open-btn">Open Invitation</button>
        </div>
    </div>

    <main id="invitation-page" class="hidden">
        <div class="card">
            <div class="top-decoration">🕊️</div>
            <h2 class="welcome-msg">You are Invited!</h2>
            <h1 id="guest-name" class="loading">Beloved Guest</h1>
            <p class="concert-details">
                Join us for an evening of Christian Music & Worship.<br>
                <strong>September 12, 2026 | 6:00 PM</strong>
            </p>
            <div class="divider"></div>
            <p class="location-tag">📍 Melbourne Grand Hall</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
