name: Deploy to S3
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 1. Define credentials here so EVERY step can see them
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2' # Make sure this matches your main.tf region

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Sync to S3
        # Removed the 'env:' from here because it's now global above
        run: |
          # Go up one level from 'terraform' folder to find your 'dist' folder
          aws s3 sync ../dist s3://rinnah-2026-invitations --delete