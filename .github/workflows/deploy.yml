name: Deploy to AWS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      # No more import steps needed! Terraform now uses the S3 state file.

      - name: Terraform Import (Final Sync)
        run: |
          # Import the Route (Format: api_id/route_id)
          # We check the API first to get the route if possible, or force import
          terraform import aws_apigatewayv2_route.rsvp_route x0p16znd81/$(aws apigatewayv2 get-routes --api-id x0p16znd81 --query "Items[?RouteKey=='POST /rsvp'].RouteId" --output text) || echo "Route already in state"
          
          # Import the Lambda Permission
          terraform import aws_lambda_permission.allow_api rinnah-rsvp-handler/AllowExecutionFromAPIGateway || echo "Permission already in state"

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Sync to S3
        run: |
          aws s3 sync .. s3://rinnah-2026-portal --delete \
            --exclude "terraform/*" \
            --exclude ".git/*" \
            --exclude ".github/*"