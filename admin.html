<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Dashboard | Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .admin-container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            margin-top: 50px;
            border: 1px solid #d4af37;
        }
        .table-wrapper {
            overflow-x: auto; /* Enables mobile scrolling */
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: white;
        }
        th {
            background: #d4af37;
            color: #000;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }
        tr:nth-child(even) { background: rgba(255,255,255,0.05); }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d4af37;
        }
        .status-done { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body style="overflow-y: auto; background: #000;">

    <div class="admin-container">
        <h2 class="script-font" style="text-align: center; color: #d4af37; font-size: 2.5rem;">RSVP Dashboard</h2>
        
        <div class="stats-bar">
            <span id="totalGuests">Total Guests: Loading...</span>
            <span id="totalSeats">Confirmed Seats: 0</span>
        </div>

        <div class="table-wrapper">
            <table id="rsvpTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Seats</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = function() {
            const cacheBuster = "?v=" + new Date().getTime();
            Papa.parse("guests.csv" + cacheBuster, {
                download: true,
                header: true,
                complete: function(results) {
                    renderTable(results.data);
                }
            });
        };

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            let seatCount = 0;
            let guestCount = 0;

            // 1. Filter out the first 4 test records
            // 2. Filter out any completely empty rows
            const liveData = data.filter((row, index) => index >= 4 && row.Name);

            liveData.forEach(guest => {
                const tr = document.createElement('tr');
                const isDone = guest.RSVP && guest.RSVP.trim().toLowerCase() === 'done';
                const seats = isDone ? (guest.Heads || 0) : 0;
                
                seatCount += parseInt(seats);
                if(isDone) guestCount++;

                tr.innerHTML = `
                    <td>${guest.ID}</td>
                    <td>${guest.Name}</td>
                    <td class="${isDone ? 'status-done' : ''}">${isDone ? '✅ Confirmed' : '⏳ Pending'}</td>
                    <td>${seats}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalGuests').innerText = `Confirmed Guests: ${guestCount}`;
            document.getElementById('totalSeats').innerText = `Total Reserved Seats: ${seatCount}`;
        }
    </script>
</body>
</html>
